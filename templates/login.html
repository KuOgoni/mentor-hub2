{% extends "base.html" %}

{% block content %}

<div class="form">

    <h1>Вход</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input name="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Пароль" required>

        <button class="btn">Войти</button>

    </form>

</div>

{% endblock %}
